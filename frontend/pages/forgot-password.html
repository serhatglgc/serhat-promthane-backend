<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Şifremi Unuttum - PromptHane</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        #step1 { display: block; }
        #step2 { display: none; }
        .code-inputs { display: flex; gap: 0.5rem; justify-content: space-between; margin-bottom: 1.5rem; }
        .code-inputs input { 
            width: 3rem; 
            height: 3.5rem; 
            text-align: center; 
            font-size: 1.5rem; 
            font-weight: bold; 
            border-radius: 10px;
            border: 1px solid var(--border);
            background: rgba(15, 18, 25, 0.6);
            color: var(--primary);
            transition: all 0.3s ease;
        }
        .code-inputs input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.15);
            background: rgba(15, 18, 25, 0.9);
            outline: none;
        }
        .step-icon {
            font-size: 3rem;
            color: var(--primary);
            text-align: center;
            margin-bottom: 1rem;
            text-shadow: 0 0 15px rgba(139, 92, 246, 0.5);
            display: block;
        }
    </style>
</head>

<body>
    <div class="auth-container">
        <div style="text-align: center; margin-bottom: 2rem;">
            <a href="../index.html" class="logo" style="justify-content: center; font-size: 2rem;">
                <i class="fa-solid fa-bolt"></i> <span>PromptHane</span>
            </a>
        </div>
        
        <!-- Step 1: Request Code -->
        <div id="step1">
            <i class="fa-solid fa-lock step-icon"></i>
            <h2 style="margin-bottom: 1rem;">Şifremi Unuttum</h2>
            <p style="color:var(--text-secondary); text-align:center; margin-bottom:2rem; font-size:0.95rem;">Kayıtlı e-posta adresinizi girin. Size 6 haneli bir doğrulama kodu göndereceğiz.</p>
            <form id="forgotForm">
                <div class="form-group">
                    <label>E-posta Adresiniz</label>
                    <input type="email" id="email" placeholder="ornek@mail.com" required>
                </div>
                <button type="submit" class="btn btn-primary" id="submitBtn">
                    <span>Kodu Gönder</span> <i class="fa-solid fa-paper-plane" style="margin-left:5px;"></i>
                </button>
                <div id="errorMsg1" class="error-message"></div>
                <div id="successMsg1" class="success-message" style="color:var(--success); margin-top:1rem; text-align:center; display:none; font-size:0.9rem;"></div>
            </form>
            <div class="auth-redirect">
                Giriş ekranına <a href="login.html">geri dön</a>
            </div>
        </div>

        <!-- Step 2: Reset Password -->
        <div id="step2">
            <i class="fa-solid fa-key step-icon"></i>
            <h2 style="margin-bottom: 1rem;">Yeni Şifre Belirle</h2>
            <p style="color:var(--text-secondary); text-align:center; margin-bottom:2rem; font-size:0.95rem;">E-postanıza gönderilen 6 haneli kodu ve yeni şifrenizi girin.</p>
            <form id="resetForm">
                <div class="form-group">
                    <label>6 Haneli Doğrulama Kodu</label>
                    <div class="code-inputs" id="codeInputs">
                        <input type="text" maxlength="1" required autofocus>
                        <input type="text" maxlength="1" required>
                        <input type="text" maxlength="1" required>
                        <input type="text" maxlength="1" required>
                        <input type="text" maxlength="1" required>
                        <input type="text" maxlength="1" required>
                    </div>
                </div>
                <div class="form-group">
                    <label>Yeni Şifreniz</label>
                    <input type="password" id="newPassword" placeholder="En az 6 karakter" minlength="6" required>
                </div>
                <button type="submit" class="btn btn-primary" id="resetBtn">
                    <span>Şifreyi Güncelle</span> <i class="fa-solid fa-check" style="margin-left:5px;"></i>
                </button>
                <div id="errorMsg2" class="error-message"></div>
            </form>
            <div class="auth-redirect">
                İptal et ve <a href="login.html">girişe dön</a>
            </div>
        </div>

    </div>

    <script src="../js/main.js"></script>
    <script src="../js/forgot-password.js"></script>
</body>
</html>
