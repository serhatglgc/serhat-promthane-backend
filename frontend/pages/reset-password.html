<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Şifre Yenile - PromptHane</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<link rel="icon" href="/assets/images/logo.png" type="image/png"></head>
<body>
    <div class="auth-container">
        <div style="text-align: center; margin-bottom: 2rem;">
            <a href="../index.html" class="logo" style="justify-content: center; font-size: 2rem;">
                <img src="/assets/images/logo.png" alt="Logo" style="height: 32px; border-radius: 6px;"> <span>PromptHane</span>
            </a>
        </div>
        
        <div style="text-align: center; margin-bottom: 1rem;">
            <i class="fa-solid fa-key" style="font-size: 3rem; color: var(--primary); text-shadow: 0 0 15px rgba(139, 92, 246, 0.5);"></i>
        </div>
        <h2 style="margin-bottom: 1rem;">Yeni Şifre Belirle</h2>
        <p style="text-align: center; color: var(--text-secondary); margin-bottom: 2rem; font-size:0.95rem;">E-postanıza gelen kodu ve yeni şifrenizi girin.</p>
        
        <form id="resetForm">
            <div class="form-group">
                <label for="email">E-posta</label>
                <input type="email" id="email" required>
            </div>
            <div class="form-group">
                <label for="code">Sıfırlama Kodu (6 Haneli)</label>
                <input type="text" id="code" required maxlength="6" placeholder="123456" style="text-align: center; font-size: 1.2rem; letter-spacing: 5px; font-weight: bold; color: var(--primary);">
            </div>
            <div class="form-group">
                <label for="newPassword">Yeni Şifre</label>
                <input type="password" id="newPassword" required placeholder="••••••••">
            </div>
            <button type="submit" class="btn btn-primary" style="margin-top: 1rem;">
                Şifreyi Güncelle <i class="fa-solid fa-check" style="margin-left:5px;"></i>
            </button>
            <div id="errorMsg" class="error-message"></div>
        </form>
        <div class="auth-redirect">
            İptal et ve <a href="login.html">girişe dön</a>
        </div>
    </div>

    <script src="../js/main.js"></script>
    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const emailParam = urlParams.get('email');
        if (emailParam) {
            document.getElementById('email').value = emailParam;
        }

        document.getElementById('resetForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const code = document.getElementById('code').value;
            const newPassword = document.getElementById('newPassword').value;
            const errorMsg = document.getElementById('errorMsg');

            try {
                const res = await fetch(`${API_URL}/auth/reset-password`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, code, newPassword })
                });
                const data = await res.json();

                if (res.ok) {
                    alert('Şifreniz başarıyla güncellendi! Giriş yapabilirsiniz.');
                    window.location.href = 'login.html';
                } else {
                    errorMsg.textContent = data.message;
                }
            } catch (error) {
                errorMsg.textContent = 'Bir hata oluştu.';
            }
        });
    </script>
</body>
</html>
