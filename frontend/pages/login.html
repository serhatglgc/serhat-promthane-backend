<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Giriş Yap - PromptHane</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<link rel="icon" href="/assets/images/logo.png" type="image/png"></head>

<body>
    <div class="auth-container">
        <div style="text-align: center; margin-bottom: 2rem;">
            <a href="../index.html" class="logo" style="justify-content: center; font-size: 2rem;">
                <img src="/assets/images/logo.png" alt="Logo" style="height: 32px; border-radius: 6px;"> <span>PromptHane</span>
            </a>
        </div>
        <h2 style="margin-bottom: 2rem;">Giriş Yap</h2>
        <form id="loginForm">
            <div class="form-group">
                <label for="email">E-posta</label>
                <input type="email" id="email" required>
            </div>
            <div class="form-group">
                <label for="password">Şifre</label>
                <input type="password" id="password" required placeholder="••••••••">
                <div style="text-align: right; margin-top: 0.5rem;">
                    <a href="forgot-password.html" style="font-size: 0.8rem; color: var(--primary); text-decoration: none;">Şifremi Unuttun mu?</a>
                </div>
            </div>
            <button type="submit" class="btn btn-primary">Giriş Yap</button>
            <div id="errorMsg" class="error-message"></div>
        </form>
        <div class="auth-redirect">
            Hesabın yok mu? <a href="register.html">Kayıt Ol</a>
        </div>
    </div>

    <script src="../js/main.js"></script>
    <script>
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const errorMsg = document.getElementById('errorMsg');

            try {
                const res = await fetch(`${API_URL}/auth/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });

                const data = await res.json();
                if (res.ok) {
                    localStorage.setItem('token', data.token);
                    localStorage.setItem('user', JSON.stringify({ id: data.id, username: data.username, email: data.email, role: data.role }));
                    window.location.href = '../index.html';
                } else {
                    errorMsg.textContent = data.message;
                }
            } catch (err) {
                errorMsg.textContent = 'Bir hata oluştu.';
            }
        });
    </script>
</body>

</html>
