<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kayıt Ol - PromptHane</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body>
    <div class="auth-container">
        <div style="text-align: center; margin-bottom: 2rem;">
            <a href="../index.html" class="logo" style="justify-content: center; font-size: 2rem;">
                <i class="fa-solid fa-bolt"></i> <span>PromptHane</span>
            </a>
        </div>
        <h2 style="margin-bottom: 2rem;">Kayıt Ol</h2>
        <form id="registerForm">
            <div class="form-group">
                <label for="username">Kullanıcı Adı</label>
                <input type="text" id="username" required minlength="3">
            </div>
            <div class="form-group">
                <label for="email">E-posta</label>
                <input type="email" id="email" required>
            </div>
            <div class="form-group">
                <label for="password">Şifre</label>
                <input type="password" id="password" required minlength="6">
            </div>
            <button type="submit" class="btn btn-primary">Kayıt Ol</button>
            <div id="errorMsg" class="error-message"></div>
        </form>
        <div class="auth-redirect">
            Zaten hesabın var mı? <a href="login.html">Giriş Yap</a>
        </div>
    </div>

    <script src="../js/main.js"></script>
    <script>
        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const username = document.getElementById('username').value;
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const errorMsg = document.getElementById('errorMsg');

            try {
                const res = await fetch(`${API_URL}/auth/register`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, email, password })
                });

                const data = await res.json();
                if (res.ok) {
                    localStorage.setItem('user', JSON.stringify({ id: data.id, username: data.username, email: data.email, role: data.role }));
                    alert('Kayıt başarılı! Lütfen e-postanıza gönderilen kodu doğrulayın.');
                    window.location.href = `verify-email.html?email=${email}`;
                } else {
                    errorMsg.textContent = data.message;
                }
            } catch (err) {
                errorMsg.textContent = 'Bir hata oluştu.';
            }
        });
    </script>
</body>

</html>
