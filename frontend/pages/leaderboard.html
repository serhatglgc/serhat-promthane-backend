<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Liderlik Tablosu - PromptHane</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .main-nav { display: flex; gap: 1.5rem; }
        .main-nav a { color: var(--text-secondary); text-decoration: none; font-weight: 500; transition: color 0.2s; }
        .main-nav a:hover, .main-nav a.active { color: var(--primary); }
    </style>
<link rel="icon" href="/assets/images/logo.png" type="image/png"></head>
<body>
    <header>
        <div class="nav-container">
            <div style="display: flex; align-items: center; gap: 2.5rem;">
                <a href="../index.html" class="logo"><img src="/assets/images/logo.png" alt="Logo" style="height: 32px; border-radius: 6px;"> <span>PromptHane</span></a>
                <nav class="main-nav">
                    <a href="templates.html">Şablonlar</a>
                    <a href="leaderboard.html" class="active">Liderlik Tablosu</a>
                </nav>
            </div>
            <div class="auth-links" id="authLinks"></div>
        </div>
    </header>

    <div class="main-container" style="max-width: 800px; margin: 2rem auto; flex-direction: column; display: flex;">
        <div class="feed-header" style="justify-content: center; margin-bottom: 3rem;">
            <h2 style="text-align: center; font-size: 2.5rem; text-shadow: 0 0 15px rgba(251, 191, 36, 0.4);"><i class="fa-solid fa-trophy" style="color: #fbbf24;"></i> Haftanın En İyileri</h2>
        </div>
        
        <p style="text-align: center; color: var(--text-secondary); margin-bottom: 2rem;">Platformda paylaştığı promptları en çok kopyalanıp değer katan liderlerimiz.</p>

        <div class="leaderboard-list" id="leaderboardList">
            <p style="text-align: center;">Yükleniyor...</p>
        </div>
    </div>

    <footer>
        <div class="footer-container">
            <div class="footer-info">
                <a href="../index.html" class="logo"><img src="/assets/images/logo.png" alt="Logo" style="height: 32px; border-radius: 6px;"> <span>PromptHane</span></a>
            </div>
            <div class="footer-bottom">&copy; 2026 PromptHane. Tüm hakları saklıdır.</div>
        </div>
    </footer>

    <script src="../js/main.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            try {
                const response = await fetch('/api/auth/leaderboard');
                const leaders = await response.json();
                
                const list = document.getElementById('leaderboardList');
                list.innerHTML = '';
                
                if(leaders.length === 0) {
                     list.innerHTML = '<p style="text-align:center; color: var(--text-secondary);">Henüz kopyalanan veya eklenen yeterli veri yok.</p>';
                     return;
                }

                leaders.forEach((l, index) => {
                    let rankIcon = `<div style="font-size: 1.5rem; width: 40px; height: 40px; border-radius: 50%; background: var(--surface); display:flex; align-items:center; justify-content:center; color: var(--text-secondary);">#${index + 1}</div>`;
                    
                    if(index === 0) rankIcon = `<div style="font-size: 2rem; width: 50px; text-align: center; font-weight: bold; color: #fbbf24; text-shadow: 0 0 10px rgba(251, 191, 36, 0.5);">🥇</div>`;
                    else if(index === 1) rankIcon = `<div style="font-size: 1.8rem; width: 50px; text-align: center; font-weight: bold; color: #9ca3af;">🥈</div>`;
                    else if(index === 2) rankIcon = `<div style="font-size: 1.8rem; width: 50px; text-align: center; font-weight: bold; color: #b45309;">🥉</div>`;

                    let borderColor = 'var(--border)';
                    if(index === 0) borderColor = '#fbbf24';

                    const card = document.createElement('div');
                    card.className = 'prompt-card';
                    card.style = `margin-bottom: 1rem; align-items: center; border-color: ${borderColor};`;
                    card.innerHTML = `
                        ${rankIcon}
                        <div style="flex: 1; padding-left: 1rem;">
                            <h3 style="margin-bottom: 0.3rem; display:flex; align-items:center; gap: 0.5rem; color: var(--text-primary); margin-top: 0;">${l.username} <span style="font-size: 0.8rem; background: rgba(0,212,255,0.1); padding: 0.3rem 0.8rem; border-radius: 20px; color: var(--primary); font-weight: 500; border: 1px solid rgba(0,212,255,0.2);">${l.badge}</span></h3>
                            <div style="color: var(--text-secondary); font-size: 0.95rem;">Toplam Puan (Beğeni + Kayıt): <b style="color: var(--text-primary);">${l.total_score}</b> • Ürettiği Prompt: ${l.total_prompts}</div>
                        </div>
                    `;
                    list.appendChild(card);
                });
            } catch (error) {
                console.error('Error fetching leaderboard:', error);
                document.getElementById('leaderboardList').innerHTML = '<p style="text-align:center; color: var(--danger);">Liderlik tablosu yüklenemedi. Sunucu bağlantısını kontrol edin.</p>';
            }
        });
    </script>
</body>
</html>
