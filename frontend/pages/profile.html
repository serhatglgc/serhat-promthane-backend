<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profilim - PromptHane</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<link rel="icon" href="/assets/images/logo.png" type="image/png"></head>

<body>
    <header>
        <div class="nav-container">
            <a href="../index.html" class="logo"><img src="/assets/images/logo.png" alt="Logo" style="height: 32px; border-radius: 6px;"> <span>PromptHane</span></a>
            <div class="auth-links" id="authLinks"></div>
        </div>
    </header>

    <div class="main-container" style="display:block;">
        <div class="detail-container">
            <div class="detail-header"
                style="text-align: center; border-bottom: 1px solid var(--border); padding-bottom: 2rem; margin-bottom: 2rem;">
                <div style="position: relative; display: inline-block;">
                    <i class="fa-solid fa-user-circle"
                        style="font-size: 5rem; color: var(--primary); margin-bottom: 1rem; filter: drop-shadow(0 0 15px rgba(99, 102, 241, 0.3));"></i>
                </div>
                <h1 class="detail-title" id="pUsername" style="margin-bottom: 0.25rem;">Yükleniyor...</h1>
                <p style="color: var(--text-secondary); font-weight: 300;" id="pEmail"></p>
                <div style="margin-top: 1.5rem; display: flex; gap: 1rem; justify-content: center;">
                    <button class="btn btn-ghost" style="color: var(--danger)" onclick="logout()"><i
                            class="fa-solid fa-sign-out-alt"></i> Çıkış Yap</button>
                    <a href="create-prompt.html" class="btn btn-primary"><i class="fa-solid fa-plus"></i> Yeni
                        Paylaşım</a>
                </div>
            </div>

            <div class="detail-body">
                <style>
                    .profile-tabs {
                        display: flex;
                        gap: 2rem;
                        border-bottom: 1px solid var(--border);
                        margin-bottom: 1.5rem;
                    }

                    .tab-btn {
                        background: none;
                        border: none;
                        color: var(--text-secondary);
                        padding: 1rem 0;
                        cursor: pointer;
                        font-weight: 600;
                        border-bottom: 2px solid transparent;
                        transition: all 0.2s;
                    }

                    .tab-btn.active {
                        color: var(--primary);
                        border-bottom-color: var(--primary);
                    }
                </style>
                <div class="profile-tabs">
                    <button class="tab-btn active" onclick="switchTab('mine')">Paylaştıklarım</button>
                    <button class="tab-btn" onclick="switchTab('saved')">Kaydedilenler</button>
                </div>

                <div class="prompt-grid" id="profileGrid" style="margin-top: 1.5rem;">
                    <p>Yükleniyor...</p>
                </div>
            </div>
        </div>
    </div>

    <script src="../js/main.js"></script>
    <script>
        const user = getUser();
        if (!user) {
            window.location.href = 'login.html';
        }

        document.getElementById('pUsername').textContent = user.username;
        document.getElementById('pEmail').textContent = user.email;

        let currentTab = 'mine';

        async function loadProfilePrompts() {
            const grid = document.getElementById('profileGrid');
            grid.innerHTML = '<p>Yükleniyor...</p>';
            try {
                let url = currentTab === 'mine' ? `${API_URL}/prompts?limit=1000` : `${API_URL}/saved`;
                const res = await fetch(url, {
                    headers: { 'Authorization': `Bearer ${getToken()}` }
                });
                const data = await res.json();
                let prompts = currentTab === 'mine' ? (data.prompts || []) : (data || []);

                if (currentTab === 'mine') {
                    prompts = prompts.filter(p => Number(p.author_id) === Number(user.id));
                }

                if (prompts.length === 0) {
                    grid.innerHTML = `<p>${currentTab === 'mine' ? 'Henüz bir prompt paylaşmadınız.' : 'Kaydedilen prompt bulunamadı.'}</p>`;
                    return;
                }

                grid.innerHTML = '';
                prompts.forEach(p => {
                    const card = document.createElement('div');
                    card.className = 'prompt-card';
                    card.style = 'flex-direction: column; gap: 1rem; padding: 1.5rem;';
                    
                    const escapedTitle = escapeHTML(p.title);
                    const escapedCategory = escapeHTML(p.category_name);
                    const date = new Date(p.created_at).toLocaleDateString('tr-TR');

                    card.innerHTML = `
                        <div class="prompt-content">
                            <div style="display:flex; justify-content:space-between; margin-bottom: 0.5rem;">
                                <span class="prompt-category">${escapedCategory}</span>
                                <span style="font-size: 0.8rem; color: var(--text-secondary);">${date}</span>
                            </div>
                            <a href="/p/${p.id}" class="prompt-title" style="font-size: 1.1rem;">${escapedTitle}</a>
                            <div class="prompt-footer" style="border:none; padding:0; margin-top:1rem;">
                                <div style="display: flex; gap: 1rem; align-items: center;">
                                    <span style="color: var(--text-secondary); font-size: 0.9rem;"><i class="fa-regular fa-heart"></i> ${p.likes_count || 0}</span>
                                    <span style="color: var(--text-secondary); font-size: 0.9rem;"><i class="fa-regular fa-comment"></i> ${p.comments_count || 0}</span>
                                    ${currentTab === 'mine' ? `
                                    <div style="margin-left: auto; display:flex; gap: 0.5rem;">
                                        <button class="action-btn" style="color:var(--primary); padding:0.2rem;" onclick="window.location.href='edit-prompt.html?id=${p.id}'" title="Düzenle"><i class="fa-solid fa-pen"></i></button>
                                        <button class="action-btn" style="color:var(--danger); padding:0.2rem;" onclick="deletePromptByUser(${p.id}, this)" title="Sil"><i class="fa-solid fa-trash"></i></button>
                                    </div>
                                    ` : ''}
                                </div>
                            </div>
                        </div>
                    `;
                    grid.appendChild(card);
                });
            } catch (err) {
                console.error(err);
                grid.innerHTML = '<p class="error-message">Hata oluştu.</p>';
            }
        }

        function switchTab(tab) {
            currentTab = tab;
            document.querySelectorAll('.tab-btn').forEach(btn => {
                btn.classList.toggle('active', btn.textContent.toLowerCase().includes(tab === 'mine' ? 'paylaş' : 'kaydet'));
            });
            loadProfilePrompts();
        }

        loadProfilePrompts();
        updateAuthUI();
    </script>
</body>

</html>
