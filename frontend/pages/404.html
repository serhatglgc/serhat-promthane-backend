<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Sayfa Bulunamadı | PromptHane</title>
    <link rel="stylesheet" href="/css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body style="justify-content: center; align-items: center; min-height: 100vh;">
    <div style="text-align: center; padding: 2rem;">
        <i class="fa-solid fa-ghost" style="font-size: 6rem; color: var(--primary); margin-bottom: 2rem; animation: ghostFloat 3s ease-in-out infinite;"></i>
        <h1 style="font-size: 4rem; margin-bottom: 1rem;">404</h1>
        <p style="font-size: 1.5rem; color: var(--text-secondary); margin-bottom: 2.5rem;">Aradığınız sayfa kaybolmuş gibi görünüyor.</p>
        <a href="/" class="btn btn-primary" style="padding: 1rem 2rem;">Ana Sayfaya Dön</a>
    </div>

    <style>
        @keyframes ghostFloat {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-20px); }
        }
    </style>
</body>
</html>
